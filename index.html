// ─────────────────────────────────────
// HELPERS
// ─────────────────────────────────────
function radio(name, value, condId) {
  const uid = 'r_' + name + '_' + value.replace(/\s+/g,'_');
  const condAttr = condId ? `data-cond="${condId}"` : '';
  return `<input type="radio" name="${name}" id="${uid}" value="${value}" ${condAttr}><label for="${uid}">${value}</label>`;
}

function radioColor(name, value, color) {
  const uid = 'r_' + name + '_' + value.replace(/\s+/g,'_');
  const cls = color ? `pill-${color}` : '';
  return `<input type="radio" name="${name}" id="${uid}" value="${value}" class="${cls}"><label for="${uid}">${value}</label>`;
}

function checkboxInput(name, value) {
  const uid = 'cb_' + name + '_' + value.replace(/\s+/g,'_');
  return `<input type="checkbox" name="${name}" id="${uid}" value="${value}"><label for="${uid}">${value}</label>`;
}

function bindConditionals() {
  const container = document.getElementById('adm-step-content');
  if (!container) return;
  const pairs = {
    'acomp': 'cond-acomp', 'dor': 'cond-dor', 'hgt': 'cond-hgt',
    'av': 'cond-av', 'av_status': 'cond-av-status', 'o2': 'cond-o2', 'sonda': 'cond-sonda',
    'dreno': 'cond-dreno', 'edema': 'cond-edema', 'hiper': 'cond-hiper',
    'lpp': 'cond-lpp', 'outras_lesoes': 'cond-outras-lesoes', 'intercorr': 'cond-intercorr',
  };
  Object.entries(pairs).forEach(([name, condId]) => {
    container.querySelectorAll(`input[name="${name}"]`).forEach(inp => {
      inp.addEventListener('change', () => updateConditionals());
    });
  });
  // sonda_tipo: show narina or oral row
  container.querySelectorAll('input[name="sonda_tipo"]').forEach(inp => {
    inp.addEventListener('change', () => updateSondaLoc());
  });
  updateConditionals();
  updateSondaLoc();
}

function updateConditionals() {
  const container = document.getElementById('adm-step-content');
  if (!container) return;
  const pairs = {
    'acomp': 'cond-acomp', 'dor': 'cond-dor', 'hgt': 'cond-hgt',
    'av': 'cond-av', 'av_status': 'cond-av-status', 'o2': 'cond-o2', 'sonda': 'cond-sonda',
    'dreno': 'cond-dreno', 'edema': 'cond-edema', 'hiper': 'cond-hiper',
    'lpp': 'cond-lpp', 'outras_lesoes': 'cond-outras-lesoes', 'intercorr': 'cond-intercorr',
  };
  Object.entries(pairs).forEach(([name, condId]) => {
    const val = container.querySelector(`input[name="${name}"]:checked`)?.value;
    const el = container.querySelector(`#${condId}`);
    if (el) {
      if (name === 'av_status') {
        // show for both options (Salinizado and Em Soroterapia)
        const soroFields = el.querySelector('#av-status-soro-fields');
        el.classList.toggle('visible', !!val);
        if (soroFields) soroFields.style.display = val === 'Em Soroterapia' ? 'block' : 'none';
      } else {
        el.classList.toggle('visible', val === 'Sim');
      }
    }
  });
}

function updateSondaLoc() {
  const container = document.getElementById('adm-step-content');
  if (!container) return;
  const tipo = container.querySelector('input[name="sonda_tipo"]:checked')?.value || '';
  const narinaRow = container.querySelector('#sonda-narina-row');
  const oralRow = container.querySelector('#sonda-oral-row');
  if (narinaRow) narinaRow.style.display = (tipo === 'SNE' || tipo === 'SNG') ? 'block' : 'none';
  if (oralRow) oralRow.style.display = tipo === 'SOG' ? 'block' : 'none';
}

// ─────────────────────────────────────
// SAVE / RESTORE STATE
// ─────────────────────────────────────
function coletarRespostas(step) {
  const container = document.getElementById('adm-step-content');
  if (!container) return;

  // radios
  container.querySelectorAll('input[type="radio"]').forEach(inp => {
    if (inp.checked) admAnswers[inp.name] = inp.value;
  });

  // checkboxes
  const cbGroups = {};
  container.querySelectorAll('input[type="checkbox"]').forEach(inp => {
    if (!cbGroups[inp.name]) cbGroups[inp.name] = [];
    if (inp.checked) cbGroups[inp.name].push(inp.value);
  });
  Object.assign(admAnswers, cbGroups);

  // ALL text-like inputs, textareas, and selects
  container.querySelectorAll('input, textarea, select').forEach(inp => {
    if (inp.type === 'radio' || inp.type === 'checkbox') return;
    if (inp.id) admAnswers[inp.id] = inp.value;
  });
}

function restaurarRespostas(step) {
  const container = document.getElementById('adm-step-content');
  if (!container) return;
  const a = admAnswers;
  Object.entries(a).forEach(([key, val]) => {
    if (Array.isArray(val)) {
      val.forEach(v => {
        const el = container.querySelector(`input[name="${key}"][value="${v}"]`);
        if (el) el.checked = true;
      });
    } else {
      const radio = container.querySelector(`input[type="radio"][name="${key}"][value="${val}"]`);
      if (radio) { radio.checked = true; return; }
      const inp = container.querySelector(`#${key}`);
      if (inp) inp.value = val;
    }
  });
  updateConditionals();
  updateSondaLoc();
}
function gerarResumo() {
  const allA = admAnswers;
  const p = pacientes[currentPatientId];
  const get = k => allA[k] || '';
  const getArr = k => Array.isArray(allA[k]) ? allA[k] : (allA[k] ? [allA[k]] : []);

  // Concordância de gênero do paciente
  const fem = p.feminino === true;
  const g = (masc, femin) => fem ? femin : masc;

  let txt = '';

  // Como encontrado — com concordância
  const encVal = (get('enc') || 'sem informação').toLowerCase();
  let encAdj = encVal
    .replace('acordado no leito', g('acordado no leito','acordada no leito'))
    .replace('dormindo no leito', 'dormindo no leito')
    .replace('acordado na poltrona', g('acordado na poltrona','acordada na poltrona'))
    .replace('dormindo na poltrona', 'dormindo na poltrona');
  txt += `Paciente ${g('encontrado','encontrada')} ${encAdj}`;

  // Consciência
  if (get('nc')) txt += `, ${get('nc').toLowerCase()}`;
  txt += '. ';

  // Pulseiras
  const pId = get('puls_presente') === 'Sim'
    ? `Pulseira de identificação presente${get('puls_legivel') === 'Sim' ? ' e legível' : ', ilegível'}`
    : 'Pulseira de identificação ausente';
  txt += pId + '. ';

  if (get('puls_queda') !== 'Não se aplica' && get('puls_queda')) {
    txt += `Pulseira de risco de queda ${get('puls_queda') === 'Sim' ? 'presente' : 'ausente'}. `;
  }
  if (get('puls_alergia') !== 'Não se aplica' && get('puls_alergia')) {
    txt += `Pulseira de alergia ${get('puls_alergia') === 'Sim' ? 'presente' : 'ausente'}. `;
  }

  // Segurança do leito
  const segItems = [];
  if (get('cama_baixa') === 'Sim') segItems.push('cama em posição baixa');
  if (get('rodas') === 'Sim') segItems.push('rodas travadas');
  if (get('grades') === 'Sim') segItems.push('grades elevadas');
  if (segItems.length) txt += `Leito em segurança: ${segItems.join(', ')}. `;

  // Campainha e orientações — com concordância
  const oriItems = [];
  if (get('camp_local') === 'Sim') oriItems.push('localizada');
  if (get('camp_testada') === 'Sim') oriItems.push('testada');
  if (oriItems.length) txt += `Campainha ${oriItems.join(' e ')}. `;
  if (get('camp_ori') === 'Sim') txt += `Paciente ${g('orientado','orientada')} sobre uso da campainha. `;
  if (get('nao_levantar') === 'Sim') txt += `${g('Orientado','Orientada')} a não levantar do leito sem auxílio. `;
  if (get('prot_queda') === 'Sim') txt += 'Protocolo de prevenção de queda orientado. ';
  if (get('compreendeu')) txt += `Paciente ${get('compreendeu') === 'Sim' ? 'compreendeu as orientações' : get('compreendeu') === 'Não' ? 'não compreendeu as orientações' : 'não foi possível avaliar compreensão'}. `;

  // Acompanhante — com concordância do acompanhante
  if (get('acomp') === 'Sim') {
    const acompTipo = get('acomp_tipo');
    const acompFemWords = ['mãe','filha','irmã','esposa','avó','neta','tia','prima','cuidadora'];
    const acompFem = acompFemWords.includes(acompTipo);
    const ag = (masc, femin) => acompFem ? femin : masc;

    txt += 'Acompanhante presente';
    if (acompTipo) txt += ` (${acompTipo})`;
    const aoriItems = [];
    if (get('acomp_camp') === 'Sim') aoriItems.push(`${ag('orientado','orientada')} sobre uso da campainha`);
    if (get('acomp_aux') === 'Sim') aoriItems.push(`${ag('orientado','orientada')} a acionar a equipe antes da deambulação`);
    if (aoriItems.length) txt += `, ${aoriItems.join(' e ')}`;
    txt += '. ';
  }

  // Dor
  if (get('dor') === 'Sim') {
    txt += `Refere dor`;
    if (get('dor_local')) txt += ` em ${get('dor_local')}`;
    if (get('dor_escala')) txt += `, intensidade ${get('dor_escala')}/10`;
    txt += '. ';
  } else if (get('dor') === 'Não') {
    txt += 'Sem queixa álgica no momento. ';
  }

  // HGT
  if (get('hgt') === 'Sim' && get('hgt_valor')) {
    txt += `HGT: ${get('hgt_valor')} mg/dL. `;
  } else if (get('hgt') === 'Não') {
    txt += 'HGT não realizado. ';
  }

  // ── DISPOSITIVOS em ordem céfalo-podal ──
  // Ordem: O2 (face/nariz) → SNE/SNG/SOG (nariz/boca) → AVP/CVC/PICC (MS) → Dreno → SVD (pelve)

  // O2
  if (get('o2') === 'Sim') {
    txt += `Mantendo oxigenoterapia com ${get('o2_disp') || 'dispositivo não informado'}`;
    if (get('o2_fluxo')) txt += ` a ${get('o2_fluxo')} L/min`;
    txt += '. ';
  }

  // Sonda nasal/oral (SNE, SNG, SOG) — cabeça
  const sondaTipo = get('sonda_tipo');
  function buildSondaTxt() {
    let s = `Mantendo ${sondaTipo || 'sonda'} instalada`;
    if (sondaTipo === 'SNE' || sondaTipo === 'SNG') {
      const narina = get('sonda_narina');
      if (narina) s += ` fixada em ${narina}`;
    } else if (sondaTipo === 'SOG') {
      s += ` via CO (cavidade oral)`;
    }
    if (get('sonda_data')) s += ` em ${formatDate(get('sonda_data'))}`;
    if (get('sonda_fix') === 'Sim') s += ', com fixação adequada';
    if (get('sonda_tracao') === 'Sim') s += ', sem tração';
    if (get('sonda_debito')) s += `, débito de ${get('sonda_debito')} mL`;
    if (get('sonda_aspecto')) s += ` (${get('sonda_aspecto')})`;
    return s + '. ';
  }

  const sondaNaoVesical = get('sonda') === 'Sim' && sondaTipo && sondaTipo !== 'SVD';
  const sondaVesical = get('sonda') === 'Sim' && sondaTipo === 'SVD';

  if (sondaNaoVesical) txt += buildSondaTxt();

  // Acesso Venoso (membros superiores)
  if (get('av') === 'Sim') {
    txt += `Mantendo ${get('av_tipo') || 'acesso venoso'}`;
    if (get('av_local')) txt += ` em ${get('av_local')}`;
    if (get('av_calibre')) txt += `, calibre ${get('av_calibre')}`;
    if (get('av_data_puncao')) txt += `, puncionado em ${formatDate(get('av_data_puncao'))}`;
    if (get('av_pervio') === 'Sim') txt += ', pérvio';
    if (get('av_status') === 'Salinizado') {
      txt += ', salinizado';
    } else if (get('av_status') === 'Em Soroterapia') {
      txt += ', em soroterapia';
      if (get('av_solucao')) txt += ` com ${get('av_solucao')}`;
      if (get('av_volume')) txt += `, ${get('av_volume')} mL`;
      if (get('av_vel_valor') && get('av_vel_tipo')) {
        const unidade = get('av_vel_tipo') === 'BIC (mL/h)' ? 'mL/h em BIC' : 'gtts/min';
        txt += `, a ${get('av_vel_valor')} ${unidade}`;
      }
    }
    const flog = [];
    if (get('av_dor') === 'Não' && get('av_calor') === 'Não' && get('av_rubor') === 'Não') {
      flog.push('sem sinais flogísticos');
    } else {
      if (get('av_dor') === 'Sim') flog.push('dor');
      if (get('av_calor') === 'Sim') flog.push('calor');
      if (get('av_rubor') === 'Sim') flog.push('rubor');
    }
    if (flog.length) txt += `, ${flog.join(', ')}`;
    const curativo = [];
    if (get('curativo_limpo') === 'Sim') curativo.push('limpo');
    if (get('curativo_seco') === 'Sim') curativo.push('seco');
    if (get('curativo_integro') === 'Sim') curativo.push('íntegro');
    if (curativo.length) txt += `, curativo ${curativo.join(', ')}`;
    if (get('av_data_curativo')) txt += `, curativo realizado em ${formatDate(get('av_data_curativo'))}`;
    if (get('av_data_equipo')) txt += `, equipo trocado em ${formatDate(get('av_data_equipo'))}`;
    txt += '. ';
  } else if (get('av') === 'Não') {
    txt += 'Sem acesso venoso. ';
  }

  // Dreno
  if (get('dreno') === 'Sim') {
    txt += `Mantendo dreno ${get('dreno_tipo') || ''}`;
    if (get('dreno_local')) txt += ` em ${get('dreno_local')}`;
    if (get('dreno_vol')) txt += `, volume de ${get('dreno_vol')} mL`;
    if (get('dreno_aspecto')) txt += ` (${get('dreno_aspecto')})`;
    txt += '. ';
  }

  // SVD (pelve — por último)
  if (sondaVesical) txt += buildSondaTxt();

  // Pele — só gera bloco se pelo menos um campo foi preenchido
  const peleInt = get('pele_int');
  const temEdema = get('edema') === 'Sim' || get('edema') === 'Não';
  const temHiper = get('hiper') === 'Sim';
  const temLpp = get('lpp') === 'Sim';
  const temOutrasLesoes = get('outras_lesoes') === 'Sim' && get('outras_lesoes_desc');
  if (peleInt || temEdema || temHiper || temLpp || temOutrasLesoes) {
    if (peleInt) txt += `Pele ${peleInt.toLowerCase()}`;
    if (temEdema) {
      const prefix = peleInt ? ', ' : 'Pele com ';
      if (get('edema') === 'Sim') txt += `${peleInt ? ', com' : 'Com'} edema${get('edema_desc') ? ' ' + get('edema_desc') : ''}`;
      else txt += `${peleInt ? ', sem edema' : 'Sem edema'}`;
    }
    if (get('hiper') === 'Sim') txt += `${(peleInt || temEdema) ? ', com' : 'Com'} hiperemia${get('hiper_local') ? ' em ' + get('hiper_local') : ''}`;
    if (get('lpp') === 'Sim') {
      txt += `${(peleInt || temEdema || temHiper) ? '. ' : ''}LPP`;
      if (get('lpp_local')) txt += ` em ${get('lpp_local')}`;
      if (get('lpp_estagio')) txt += `, estágio ${get('lpp_estagio')}`;
      if (get('lpp_cobertura')) txt += `, cobertura ${get('lpp_cobertura')}`;
      if (get('lpp_exsudato')) txt += `, exsudato ${get('lpp_exsudato')}`;
    }
    if (temOutrasLesoes) {
      txt += `${(peleInt || temEdema || temHiper || temLpp) ? '. ' : ''}Outras lesões: ${get('outras_lesoes_desc')}`;
    }
    txt += '. ';
  }

  // Dieta
  if (get('dieta_tipo')) {
    txt += `Dieta ${get('dieta_tipo').toLowerCase()}`;
    if (get('dieta_aceit')) txt += ` com ${get('dieta_aceit').toLowerCase()} aceitação`;
    txt += '. ';
  }

  // Diurese
  if (get('diurese_origem') === 'Não houve') {
    txt += 'Sem diurese no período. ';
  } else if (get('diurese_origem')) {
    txt += `Diurese ${get('diurese_origem').toLowerCase()}`;
    if (get('diurese_qtd')) txt += `, ${get('diurese_qtd')} mL`;
    if (get('diurese_aspecto')) txt += `, aspecto ${get('diurese_aspecto')}`;
    txt += '. ';
  }

  // Evacuação
  if (get('evac_origem') === 'Não houve') {
    txt += 'Sem evacuação no período. ';
  } else if (get('evac_origem')) {
    txt += `Evacuação ${get('evac_origem').toLowerCase()}`;
    if (get('evac_consist')) txt += `, consistência ${get('evac_consist').toLowerCase()}`;
    if (get('evac_qtd')) txt += `. ${get('evac_qtd')}`;
    txt += '. ';
  }

  // Intercorrências
  if (get('intercorr') === 'Não') {
    txt += 'Sem intercorrências no período. ';
  } else if (get('intercorr') === 'Sim') {
    const tipos = getArr('intercorr_tipo');
    txt += `Intercorrência(s): ${tipos.join(', ') || 'não especificado'}. `;
    if (get('intercorr_desc')) txt += get('intercorr_desc') + ' ';
  }

  // ── SSVV SEMPRE NO FINAL ──
  const sv = [];
  if (get('sv_pa')) sv.push(`PA: ${get('sv_pa')} mmHg`);
  if (get('sv_fc')) sv.push(`FC: ${get('sv_fc')} bpm`);
  if (get('sv_fr')) sv.push(`FR: ${get('sv_fr')} irpm`);
  if (get('sv_temp')) sv.push(`Tax: ${get('sv_temp')}°C`);
  if (get('sv_sat')) sv.push(`Sat: ${get('sv_sat')}%`);
  if (sv.length) txt += `Realizado SSVV — ${sv.join(' | ')}.`;

  // show result
  document.getElementById('result-title').textContent = `${p.leito} — ${p.nome}`;
  document.getElementById('result-text').textContent = txt.trim();
  showScreen('result');
}

function renderModalMedList(filtro) {
  const body = document.getElementById('modal-medlist-body');
  const f = normMed(filtro || '');
  let lista = MED_DB;
  if (f) {
    lista = MED_DB.filter(m => {
      const mn = normMed(m.n), mp = normMed(m.p);
      const mc = (m.c || []).map(x => normMed(x));
      return mn.includes(f) || mp.includes(f) || mc.some(c => c.includes(f)) ||
        levenshtein(f, mn) <= 2 || mc.some(c => levenshtein(f, c) <= 2);
    });
  }
  // Update count badge
  const countEl = document.getElementById('modal-medlist-count');
  if (countEl) {
    if (f) {
      countEl.textContent = `${lista.length} resultado${lista.length !== 1 ? 's' : ''}`;
    } else {
      countEl.textContent = `${MED_DB.length} medicações`;
    }
  }
  if (!lista.length) {
    body.innerHTML = '<div class="empty-state">Nenhuma medicação encontrada.</div>';
    return;
  }
  const grupos = {};
  lista.forEach(m => { if (!grupos[m.g]) grupos[m.g] = []; grupos[m.g].push(m); });
  let html = '';
  Object.keys(grupos).forEach(g => {
    html += `<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin:12px 0 7px;">${g}</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;">`;
    grupos[g].forEach(m => {
      const comercial = (m.c && m.c.length) ? m.c.slice(0,3).join(' · ') : '';
      html += `<div style="display:flex;flex-direction:column;gap:1px;background:rgba(200,168,80,.07);border:1px solid rgba(200,168,80,.16);border-radius:20px;padding:5px 13px;">
        <span style="font-size:12px;font-weight:700;color:var(--accent);">${m.n}</span>
        ${comercial ? `<span style="font-size:10px;color:var(--muted);">${comercial}</span>` : ''}
      </div>`;
    });
    html += '</div>';
  });
  body.innerHTML = html;
}

function renderPainelAnotacoes() {
  const body = document.getElementById('modal-painel-body');
  const ids = Object.keys(pacientes);

  if (!ids.length) {
    body.innerHTML = '<div style="text-align:center;color:var(--muted);padding:32px 0;font-size:13px;">Nenhum paciente cadastrado no momento.</div>';
    return;
  }

  let html = '';
  ids.forEach((id, idx) => {
    const p = pacientes[id];

    // Coletar todas as anotações em ordem cronológica
    const anotacoes = [];

    // Anotação de admissão (gerada automaticamente)
    if (p.admissaoFeita && p.admissaoTexto) {
      anotacoes.push({ tipo: 'Admissão', time: null, texto: p.admissaoTexto });
    }

    // Anotações manuais (notes)
    (p.notes || []).forEach(n => {
      anotacoes.push({ tipo: 'Anotação', time: n.time, texto: n.text });
    });

    const separador = idx > 0 ? 'border-top:1px solid rgba(200,168,80,.10);padding-top:20px;margin-top:4px;' : '';

    html += `
      <div style="${separador}margin-bottom:20px;">
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:10px;">
          <span style="font-size:18px;font-weight:800;color:var(--accent);letter-spacing:.02em;">${escapeHtml(p.leito)}</span>
          <span style="font-size:14px;font-weight:500;color:var(--fg);">${escapeHtml(p.nome)}</span>
        </div>`;

    if (!anotacoes.length) {
      html += `<div style="font-size:12px;color:var(--muted);padding:8px 12px;background:rgba(200,168,80,.04);border:1px solid rgba(200,168,80,.08);border-radius:8px;">Nenhuma anotação registrada.</div>`;
    } else {
      anotacoes.forEach(a => {
        const timeBadge = a.time
          ? `<span style="font-size:10px;color:var(--muted);background:rgba(200,168,80,.08);border:1px solid rgba(200,168,80,.12);border-radius:20px;padding:2px 8px;white-space:nowrap;">${escapeHtml(a.time)}</span>`
          : `<span style="font-size:10px;color:var(--accent);background:rgba(200,168,80,.10);border:1px solid rgba(200,168,80,.18);border-radius:20px;padding:2px 8px;">Admissão</span>`;
        html += `
          <div style="margin-bottom:8px;background:rgba(200,168,80,.03);border:1px solid rgba(200,168,80,.09);border-radius:10px;padding:10px 13px;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">${timeBadge}</div>
            <div style="font-size:13px;color:var(--fg);line-height:1.6;white-space:pre-wrap;">${escapeHtml(a.texto)}</div>
          </div>`;
      });
    }

    html += `</div>`;
  });

  body.innerHTML = html;
}

function copiarTodasAnotacoes() {
  const ids = Object.keys(pacientes);
  if (!ids.length) { alert('Nenhum paciente cadastrado.'); return; }

  const linhas = [];
  ids.forEach(id => {
    const p = pacientes[id];
    linhas.push(`Quarto ${p.leito}`);
    linhas.push(p.nome);

    const anotacoes = [];
    if (p.admissaoFeita && p.admissaoTexto) {
      anotacoes.push({ time: null, texto: p.admissaoTexto });
    }
    (p.notes || []).forEach(n => {
      anotacoes.push({ time: n.time, texto: n.text });
    });

    if (!anotacoes.length) {
      linhas.push('(Nenhuma anotação registrada)');
    } else {
      anotacoes.forEach((a, i) => {
        if (a.time) linhas.push(`[${a.time}]`);
        else linhas.push('[Admissão]');
        linhas.push(a.texto);
        if (i < anotacoes.length - 1) linhas.push('');
      });
    }
    linhas.push('');
  });

  const texto = linhas.join('\n').trim();
  navigator.clipboard.writeText(texto)
    .then(() => alert('Todas as anotações copiadas!'))
    .catch(() => prompt('Copie o texto abaixo:', texto));
}

<script>
  (()=>{
    'use strict';

    const canvas = document.getElementById('ascii-bg');
    if(!canvas) return;
    const ctx = canvas.getContext('2d', {alpha:false});
    const DPR = Math.min(window.devicePixelRatio||1, 2);

    /* ── paleta outono fixa ── */
    const S = {
      water_sh: ['#5a4a3a','#6a5a48','#7a6a55','#8a7a65'],
      water_dp: ['#3a4a5a','#4a5a6a','#5a6070'],
      shore:    ['#6a4a2a','#7a5a38','#8a6a45','#9a7a55'],
      land:     ['#3a2818','#4a3820','#5a4828','#6a5835','#7a6840','#8a7850'],
      green:    ['#6a4020','#7a5028','#8a6035'],
      flower:   ['#d84020','#e05030','#c85028','#b04020'],
      dot:      ['#3a2818','#442e20','#503828'],
      bgBase:   '#080604',
      particle: '#8a6a4a',
    };

    /* ── zonas ── */
    const LAND=0,SHORE_OUTER=1,SHORE_INNER=2,WATER_SHALLOW=3,WATER_DEEP=4,WATER_DEEPEST=5;
    const ZC = {
      0:[' ',' ',' ',' ','.','.','.','"','"',',','·'],
      1:[' ',' ',' ','.','.','"',',','♣'],
      2:['|','|','¦',';',' ','♠'],
      3:[' ',' ','~','~','·'],
      4:[' ',' ',' ','~','·'],
      5:[' ',' ',' ','·']
    };
    const WCHARS = ['·','∘','~','∿','≈'];
    const FCHARS = ['·','*','',''];
    const WZ = [WATER_SHALLOW,WATER_DEEP,WATER_DEEPEST];

    /* ── dimensões ── */
    const FONT_PX = 14*DPR;
    const CHAR_W  = (25/3)*DPR;
    const LINE_H  = (67/3)*DPR;
    const TILE_ROWS = 160;
    let cW, cH, COLS, VISIBLE_ROWS;

    function resize(){
      cW = window.innerWidth; cH = window.innerHeight;
      canvas.width  = Math.round(cW*DPR); canvas.height = Math.round(cH*DPR);
      canvas.style.width  = cW+'px'; canvas.style.height = cH+'px';
      COLS = Math.ceil(canvas.width/CHAR_W)+2;
      VISIBLE_ROWS = Math.ceil(canvas.height/LINE_H)+2;
    }
    resize();

    /* ── noise Perlin ── */
    function fade(t){return t*t*t*(t*(6*t-15)+10);}
    function grad(h,x,y){const a=3&h,r=a<2?x:y,i=a<2?y:x;return((1&a)?-r:r)+((2&a)?-i:i);}
    const perm=(function(seed){let p=[];for(let i=0;i<256;i++)p[i]=i;let s=seed;for(let i=255;i>0;i--){s=(s*16807)%2147483647;const j=s%(i+1);[p[i],p[j]]=[p[j],p[i]];}return[...p,...p];})(42);
    function snoise(x,y){
      const xi=Math.floor(x)&255,yi=Math.floor(y)&255;
      const xf=x-Math.floor(x),yf=y-Math.floor(y);
      const u=fade(xf),v=fade(yf);
      const aa=perm[perm[xi]+yi],ab=perm[perm[xi]+yi+1],ba=perm[perm[xi+1]+yi],bb=perm[perm[xi+1]+yi+1];
      const r1=grad(aa,xf,yf)+(grad(ba,xf-1,yf)-grad(aa,xf,yf))*u;
      const r2=grad(ab,xf,yf-1)+(grad(bb,xf-1,yf-1)-grad(ab,xf,yf-1))*u;
      return r1+(r2-r1)*v;
    }

    /* ── RNG determinístico ── */
    let rngS=42;
    function rng(){rngS=(rngS*16807)%2147483647;return rngS/2147483647;}

    /* ── color helpers ── */
    function pickColor(arr,lp){return arr[Math.min(Math.floor(lp*arr.length),arr.length-1)];}
    function colorFor(zone,ch,lp){
      if('~·∘∿≈'.includes(ch)){
        if(zone===WATER_SHALLOW) return pickColor(S.water_sh,lp);
        return pickColor(S.water_dp,lp);
      }
      if('*'.includes(ch)) return pickColor(S.flower,lp);
      if('"'===ch||','===ch||"'"===ch||';'===ch||'`'===ch) return pickColor(S.land,lp);
      if('|'===ch||'¦'===ch) return pickColor(S.shore,lp);
      if('♣'===ch||'♠'===ch) return pickColor(S.green,lp);
      if('·'===ch) return pickColor(S.flower,lp);
      if('.'===ch) return pickColor(S.dot,lp);
      if('/'===ch||'\\'===ch) return pickColor(S.green,lp);
      return '#505050';
    }

    /* ── tile ── */
    let TILE=[], RDATA=[];
    function buildTile(){
      TILE=[]; RDATA=[];
      const seed=42;
      const minW=Math.floor(COLS*0.35), maxW=Math.floor(COLS*0.52);
      const cx=COLS/2;
      for(let r=0;r<TILE_ROWS;r++){
        const meander=
          0.38*Math.sin(0.008*r+seed)*Math.cos(0.003*r+1.1)+
          0.28*Math.sin(0.018*r+seed+2.3)+
          0.18*Math.sin(0.035*r+seed+4.7)*Math.cos(0.012*r+0.5)+
          0.10*Math.sin(0.055*r+seed+1.9)+
          0.06*Math.sin(0.09*r+seed+3.3);
        const center=Math.round(cx+meander*0.55*(0.3*COLS));
        const rwF=1+0.3*Math.sin(0.012*r+seed+100)*Math.cos(0.007*r+2)+0.15*Math.sin(0.025*r+seed+200)+0.1*Math.sin(0.04*r+seed+300);
        const rw=Math.round(Math.max(minW,Math.min(maxW,(minW+maxW)/2*rwF)));
        const lsh=Math.max(0,center-Math.round(rw/2));
        const rsh=Math.min(COLS-1,center+Math.round(rw/2));
        const lo=Math.max(2,Math.round(12*(1+0.35*Math.sin(0.025*r+seed+200)*0.5)));
        const li=Math.max(1,Math.round(3*(1+0.3*Math.sin(0.025*r+seed+300)*0.4)));
        const ld=Math.max(2,Math.round(5*(1+0.35*Math.sin(0.025*r+seed+400)*0.5)));
        const lx=Math.max(2,Math.round(10*(1+0.35*Math.sin(0.025*r+seed+500)*0.7)));
        RDATA.push({lsh,rsh,center});
        const row=[];
        for(let c=0;c<COLS;c++){
          const lt=c-lsh,rt=rsh-c;
          let zone;
          if(c<lsh-lo-li) zone=LAND;
          else if(c<lsh-li) zone=SHORE_OUTER;
          else if(c<lsh) zone=SHORE_INNER;
          else if(c>rsh+lo+li) zone=LAND;
          else if(c>rsh+li) zone=SHORE_OUTER;
          else if(c>rsh) zone=SHORE_INNER;
          else{
            const dc=Math.abs(c-center);
            if(dc<lx/2) zone=WATER_DEEPEST;
            else if(Math.min(lt,rt)<ld) zone=WATER_SHALLOW;
            else zone=WATER_DEEP;
          }
          const chars=ZC[zone];
          const ch=chars[Math.floor(rng()*chars.length)];
          row.push({ch,base:ch,zone,lp:0.5,op:1,rot:0,vis:true});
        }
        TILE.push(row);
      }
    }

    function tileRow(r){return((r%TILE_ROWS)+TILE_ROWS)%TILE_ROWS;}
    function tileRdata(r){return RDATA[tileRow(r)];}

    /* ── update tile (animação do rio) ── */
    let bgFrame=0;
    function updateTile(f){
      const t=f*0.13, tw=t*0.65;
      for(let r=0;r<TILE_ROWS;r++){
        for(let c=0;c<COLS;c++){
          const cell=TILE[r][c];
          if(WZ.includes(cell.zone)){
            const n=snoise(0.035*c+0.0005*t,0.018*r-0.0007*t);
            const thr=cell.zone===WATER_DEEPEST?-0.22:cell.zone===WATER_DEEP?-0.02:-0.2;
            const p=n-thr;
            if(p>0){
              cell.vis=true;
              const idx=Math.min(Math.floor((p/0.6)*WCHARS.length),WCHARS.length-1);
              cell.ch=WCHARS[idx];
              cell.op=Math.min(1,p*2.5);
              const nx2=snoise(0.035*c+0.0005*t+0.5,0.018*r-0.0007*t);
              cell.rot=90+(n-nx2)*80;
            } else {
              cell.vis=false; cell.ch=' '; cell.op=0;
            }
            const la=Math.PI/2+0.25*snoise(0.0015*t,100);
            cell.lp=Math.max(0,Math.min(1,(Math.sin(c*Math.cos(la)*0.07+r*Math.sin(la)*0.045-0.01*t)+0.2*snoise(0.04*c+50,0.04*r+50)+1)*0.45));
          } else {
            const wa=0.45*snoise(0.003*tw,0);
            cell.lp=Math.max(0,Math.min(1,(Math.sin(c*Math.cos(wa)*0.055+0.28*Math.sin(wa)*r*0.038-0.009*tw)+0.1*snoise(0.025*c,0.025*r)+1)*0.5));
            if(cell.zone===SHORE_INNER||cell.zone===SHORE_OUTER) cell.rot=((cell.lp-0.5)*2)*18;
            if((cell.zone===LAND||cell.zone===SHORE_OUTER)&&cell.base==='·'){
              const fi=Math.min(Math.floor(cell.lp*FCHARS.length),FCHARS.length-1);
              cell.ch=FCHARS[fi];
            }
          }
        }
      }
    }

    /* ── partículas ── */
    let particles=[], pid=0;
    function spawnParticles(){
      const startR=0;
      if(Math.random()<0.04&&particles.filter(p=>p.t==='w').length<10){
        const r=startR+Math.floor(Math.random()*VISIBLE_ROWS);
        const rd=tileRdata(r); if(!rd) return;
        const c=rd.lsh+Math.random()*(rd.rsh-rd.lsh);
        particles.push({id:pid++,x:c,yr:r,ch:['·','∘','○'][Math.floor(Math.random()*3)],op:0,age:0,maxAge:100+Math.random()*80,t:'w'});
      }
      if(Math.random()<0.05&&particles.filter(p=>p.t==='b').length<8){
        const r=startR+Math.floor(Math.random()*VISIBLE_ROWS);
        const rd=tileRdata(r); if(!rd) return;
        const c=(rd.lsh+rd.rsh)/2+(Math.random()-0.5)*(rd.rsh-rd.lsh)*0.35;
        particles.push({id:pid++,x:c,yr:r,ch:'°',op:0,age:0,maxAge:70+Math.random()*70,t:'b',tw:Math.random()*Math.PI*2});
      }
    }
    function updateParticles(){
      const next=[];
      for(const p of particles){
        const nx=p.x+0.03*Math.sin(0.1*p.yr+0.07*p.x+0.018*p.age);
        const nyr=p.yr+0.028; const age=p.age+1; let op;
        if(p.t==='b'){p.tw=(p.tw||0)+0.05;op=Math.min(1,age/10)*Math.max(0,(p.maxAge-age)/15)*(0.75+0.2*Math.sin(p.tw));}
        else{op=age<15?age/15*0.8:age>p.maxAge-20?(p.maxAge-age)/20*0.8:0.8;}
        if(age<p.maxAge) next.push({...p,x:nx,yr:nyr,age,op});
      }
      particles=next;
    }

    /* ── sprites de terra ── */
    let landSprites=[];
    const FARM_LINES=['.-.___|','|=|/  \\','|_|___|'];
    function farmColor(ch){
      const p={roof:['#703018','#803820'],wall:['#a89060','#b8a070'],detail:['#805030','#704028'],win:['#c8a858','#d8b868']};
      if(ch==='/'||ch==='\\') return p.roof[0];
      if(ch==='-'||ch==='_') return p.detail[0];
      if(ch==='|') return p.wall[0];
      return p.detail[1];
    }
    function spawnLandSprite(){
      if(landSprites.filter(s=>s.kind==='farm').length>=2) return;
      const lines=FARM_LINES;
      const w=lines.reduce((m,l)=>Math.max(m,l.length),0), h=lines.length;
      const candidates=[];
      for(let r=3;r<TILE_ROWS-h-2;r++){
        const rd=RDATA[r]; if(!rd) continue;
        const ls=rd.lsh-w-3, rs=rd.rsh+3;
        if(ls>2) candidates.push({r,c:Math.floor(Math.random()*Math.max(1,ls-1))+1});
        if(rs+w<COLS-1) candidates.push({r,c:rs+Math.floor(Math.random()*Math.max(1,COLS-rs-w-1))});
      }
      if(!candidates.length) return;
      const pos=candidates[Math.floor(Math.random()*candidates.length)];
      for(const sp of landSprites){
        if(Math.abs(sp.r-pos.r)<h+2&&Math.abs(sp.c-pos.c)<w+4) return;
      }
      landSprites.push({kind:'farm',lines,colorFn:farmColor,r:pos.r,c:pos.c,op:0,phase:'in',born:bgFrame,lifeMax:700+Math.floor(Math.random()*500)});
    }
    function updateLandSprites(){
      const FI=100,FO=150;
      landSprites=landSprites.filter(sp=>{
        const age=bgFrame-sp.born;
        if(sp.phase==='in'){sp.op=Math.min(1,age/FI);if(age>=FI)sp.phase='hold';}
        else if(sp.phase==='hold'){if(age>=sp.lifeMax)sp.phase='out';}
        else if(sp.phase==='out'){sp.op=Math.max(0,1-(age-sp.lifeMax)/FO);if(sp.op<=0)return false;}
        return true;
      });
      if(Math.random()<0.003) spawnLandSprite();
    }

    /* ── tartarugas ── */
    let turtles=[];
    function spawnTurtle(){
      if(turtles.length>=3) return;
      const r=Math.floor(Math.random()*TILE_ROWS);
      const rd=RDATA[r]; if(!rd) return;
      const side=Math.random()<0.5?'left':'right';
      const c=side==='left'?rd.lsh+1:rd.rsh-2;
      if(c<1||c>=COLS-2) return;
      for(const t of turtles){if(Math.abs(t.r-r)<3&&Math.abs(t.c-c)<4) return;}
      turtles.push({r,c,op:0,phase:'in',born:bgFrame,lifeMax:500+Math.floor(Math.random()*400)});
    }
    function updateTurtles(){
      const FI=80,FO=100;
      turtles=turtles.filter(t=>{
        const age=bgFrame-t.born;
        if(t.phase==='in'){t.op=Math.min(1,age/FI);if(age>=FI)t.phase='hold';}
        else if(t.phase==='hold'){if(age>=t.lifeMax)t.phase='out';}
        else if(t.phase==='out'){t.op=Math.max(0,1-(age-t.lifeMax)/FO);if(t.op<=0)return false;}
        return true;
      });
      if(Math.random()<0.002) spawnTurtle();
    }

    /* ── patinhos ── */
    let ducks=[];
    function spawnDuck(){
      if(ducks.length>=2) return;
      const r=Math.floor(Math.random()*VISIBLE_ROWS);
      const rd=tileRdata(r); if(!rd) return;
      const c=rd.lsh+1+Math.random()*(rd.rsh-rd.lsh-2);
      for(const d of ducks){if(Math.abs(d.r-r)<3&&Math.abs(d.c-c)<5) return;}
      ducks.push({r,c,vy:0.012+Math.random()*0.008,op:0});
    }
    function updateDucks(){
      ducks=ducks.filter(d=>{
        const rd=tileRdata(Math.floor(d.r));
        if(rd){const cx=(rd.lsh+rd.rsh)/2; d.c+=(cx-d.c)*0.01;}
        d.r+=d.vy; d.op=Math.min(1,d.op+0.015);
        return d.r<VISIBLE_ROWS+4;
      });
      if(Math.random()<0.0008) spawnDuck();
    }

    /* ── renderização ── */
    const MONO='"SF Mono",Monaco,Inconsolata,"Courier New",monospace';
    function renderBG(){
      ctx.fillStyle=S.bgBase; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.font=`${FONT_PX}px ${MONO}`; ctx.textBaseline='top';
      const startR=0, endR=startR+VISIBLE_ROWS+1;
      for(let r=startR;r<=endR;r++){
        const py=r*LINE_H; if(py<-LINE_H||py>canvas.height+LINE_H) continue;
        const row=TILE[tileRow(r)];
        for(let c=0;c<COLS;c++){
          const cell=row[c]; const ch=cell.ch; if(!ch||ch===' ') continue;
          const px=c*CHAR_W, lp=cell.lp||0.5;
          const color=colorFor(cell.zone,ch,lp);
          if(WZ.includes(cell.zone)&&'~·∘∿≈'.includes(ch)&&cell.vis&&cell.op>0.05){
            ctx.save(); ctx.globalAlpha=Math.min(1,cell.op);
            const cxp=px+CHAR_W/2, cyp=py+FONT_PX/2;
            ctx.translate(cxp,cyp); ctx.rotate((cell.rot||0)*Math.PI/180); ctx.translate(-cxp,-cyp);
            ctx.fillStyle=color; ctx.fillText(ch,px,py); ctx.restore();
          } else {
            ctx.fillStyle=color; ctx.fillText(ch,px,py);
          }
        }
      }

      /* partículas */
      for(const p of particles){
        const py=p.yr*LINE_H; if(py<-LINE_H||py>canvas.height+LINE_H) continue;
        ctx.save(); ctx.globalAlpha=Math.max(0,p.op);
        ctx.fillStyle=S.particle; ctx.fillText(p.ch,p.x*CHAR_W,py); ctx.restore();
      }

      /* fazendas */
      const SZ=Math.round(FONT_PX*0.55);
      const CW=SZ*0.62, LH=SZ*1.15;
      for(const sp of landSprites){
        if(sp.op<0.02) continue;
        const basePy=sp.r*LINE_H;
        if(basePy>canvas.height+LINE_H*4||basePy+sp.lines.length*LH<-LINE_H) continue;
        ctx.save(); ctx.globalAlpha=sp.op*0.85;
        ctx.font=`${SZ}px ${MONO}`; ctx.textBaseline='top';
        for(let li=0;li<sp.lines.length;li++){
          const py=basePy+li*LH;
          const line=sp.lines[li];
          for(let ci=0;ci<line.length;ci++){
            const ch=line[ci]; if(ch===' ') continue;
            ctx.fillStyle=sp.colorFn(ch);
            ctx.fillText(ch,sp.c*CHAR_W+ci*CW,py);
          }
        }
        ctx.restore();
      }

      /* tartarugas */
      for(const t of turtles){
        if(t.op<0.02) continue;
        const px=t.c*CHAR_W, py=t.r*LINE_H;
        if(py<-LINE_H*2||py>canvas.height+LINE_H) continue;
        ctx.save(); ctx.globalAlpha=t.op*0.82;
        ctx.font=`${SZ}px ${MONO}`; ctx.textBaseline='top';
        ctx.fillStyle='#7a5830'; ctx.fillText(' o',px,py);
        ctx.fillStyle='#6a8848'; ctx.fillText('_O_',px,py+SZ*1.1);
        ctx.restore();
      }

      /* patinhos */
      for(const d of ducks){
        if(d.op<0.02) continue;
        const px=Math.floor(d.c)*CHAR_W, py=d.r*LINE_H;
        if(py<-LINE_H*2||py>canvas.height+LINE_H) continue;
        ctx.save(); ctx.globalAlpha=d.op*0.52;
        ctx.font=`${SZ}px ${MONO}`; ctx.textBaseline='top';
        ctx.fillStyle='#a89840'; ctx.fillText('>o)',px,py);
        ctx.fillStyle='#957830'; ctx.fillText('(_>',px,py+SZ*1.1);
        ctx.restore();
      }
    }

    /* ── loop ── */
    let lastTs=0;
    function loop(ts){
      if(!lastTs) lastTs=ts;
      const dt=Math.min(ts-lastTs,50); lastTs=ts;
      bgFrame++;
      if(bgFrame%3===0) updateTile(bgFrame);
      spawnParticles(); updateParticles();
      updateLandSprites(); updateTurtles(); updateDucks();
      renderBG();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize',()=>{
      resize();
      buildTile();
    },{passive:true});

    buildTile();
    updateTile(0);
    requestAnimationFrame(loop);
  })();
  </script>
</body>
